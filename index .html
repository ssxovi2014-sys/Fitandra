<!DOCTYPE html>
<html lang="ro">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>FitAndra V3</title>
<style>
body{margin:0;font-family:Arial;background:linear-gradient(#fff0f6,#ffe4ef);color:#321827}
header{position:sticky;top:0;background:#fff7fbef;padding:16px;border-bottom:1px solid #ffd1e2;z-index:5}
h1{margin:0;font-size:28px}.sub{color:#8b6475}
.wrap{padding:14px;max-width:850px;margin:auto}.card{background:white;border:1px solid #ffd1e2;border-radius:24px;padding:16px;margin:12px 0;box-shadow:0 10px 30px #c2185b18}
.hero{background:linear-gradient(135deg,#ff5c93,#ffb3cf);color:white;border-radius:28px;padding:22px}
button{width:100%;border:0;border-radius:18px;padding:15px;font-size:17px;font-weight:900;background:linear-gradient(135deg,#ff5c93,#ff8fbd);color:white;margin:6px 0}
button.secondary{background:white;color:#321827;border:1px solid #ffd1e2}
button.green{background:#22c55e;color:#07120a}
.pill{display:inline-block;border-radius:999px;padding:8px 12px;margin:4px;font-weight:900;background:#ffe4ef;color:#be185d}
.calendar{display:grid;grid-template-columns:repeat(7,1fr);gap:6px}.day{aspect-ratio:1/1;border-radius:14px;background:#fff0f6;border:1px solid #ffd1e2;display:flex;align-items:center;justify-content:center;font-weight:900;color:#b66a8a}.done{background:#22c55e!important;color:#06210e!important}.today{outline:3px solid #ff5c93}
.hidden{display:none}.stage{background:linear-gradient(135deg,#ff8fbd,#ffd1e2);border-radius:22px;padding:16px;text-align:center;font-weight:900;font-size:22px;color:#741238}
.anim{width:100%;max-width:380px;height:250px;display:block;margin:10px auto;background:#fff7fb;border:1px solid #ffd1e2;border-radius:24px}
.exercise{text-align:center;background:#fff7fb;border:1px solid #ffd1e2;border-radius:22px;padding:15px;margin:10px 0}
.title{font-size:26px;font-weight:900}.steps{text-align:left;background:white;border:1px solid #ffd1e2;border-radius:16px;padding:12px;line-height:1.55;margin-top:10px}
.progress{height:17px;background:#ffe4ef;border-radius:999px;overflow:hidden}.bar{height:100%;background:linear-gradient(90deg,#ff5c93,#f7c948)}
</style>
</head>
<body>
<header><h1>🌸 FitAndra</h1><div class="sub">Fără timer · exerciții explicate simplu</div></header>
<div class="wrap">
<div id="home">
 <div class="hero"><h2>Bună, Andra ❤️</h2><div>Astăzi facem 30 de minute doar pentru tine.</div></div>
 <div class="card">
  <h2>Programul tău</h2>
  <span class="pill" id="weekPill"></span><span class="pill" id="totalPill"></span><span class="pill" id="badgePill"></span>
  <div class="progress"><div class="bar" id="bar"></div></div><p class="sub" id="badgeText"></p>
  <button onclick="startToday()">START ANTRENAMENT</button>
  <button class="secondary" onclick="showPlan()">Vezi săptămâna</button>
 </div>
 <div class="card"><h2>Calendar</h2><div class="calendar" id="calendar"></div></div>
 <div class="card"><h2>Medalii</h2><div style="font-size:38px;text-align:center" id="bigBadge">🌱</div><p class="sub">10 🥉 · 25 🥈 · 50 🥇 · 100 👑</p></div>
</div>
<div id="plan" class="hidden"><div class="card"><h2 id="planTitle"></h2><div id="planBody"></div><button class="secondary" onclick="goHome()">Înapoi</button></div></div>
<div id="workout" class="hidden"><div class="card">
 <div class="stage" id="workoutTitle"></div>
 <svg class="anim" id="anim" viewBox="0 0 380 250"></svg>
 <div class="exercise"><div class="title" id="exName"></div><p id="exDetails"></p><small id="exTip"></small><div class="steps" id="exSteps"></div></div>
 <button class="green" onclick="nextExercise()">AM FĂCUT EXERCIȚIUL</button>
 <button class="secondary" onclick="nextExercise()">SAR PESTE</button>
</div></div>
<div id="finish" class="hidden"><div class="card"><div class="stage">🎉 Bravo, Andra!</div><h2>Ai terminat antrenamentul.</h2><p>❤️ Sunt mândru de tine. Încă un pas făcut.</p><button onclick="completeWorkout()">Salvează antrenamentul</button></div></div>
</div>
<script>
const STORE='fitandra_v3';let state={doneDates:[],total:0,startDate:null};let currentWorkout=[],currentIndex=0,currentLabel='';
const ex={
squat:["Genuflexiuni","3 serii × 12 repetări","Coboară ca pe scaun.","1. Picioarele la lățimea umerilor.<br>2. Coboară lent.<br>3. Împinge în călcâie când urci."],
glute:["Pod fesier","3 serii × 15 repetări","Strânge fesierii sus.","1. Stai pe spate.<br>2. Ridică bazinul.<br>3. Revino controlat."],
lunge:["Fandări","3 serii × 10 / picior","Pas controlat.","1. Fă un pas înainte.<br>2. Coboară vertical.<br>3. Revino și schimbă piciorul."],
row:["Ramat cu gantere","3 serii × 12 repetări","Pentru spate și postură.","1. Apleacă ușor trunchiul.<br>2. Trage coatele în spate.<br>3. Coboară controlat."],
press:["Presă umeri","3 serii × 10 repetări","Pentru umeri.","1. Gantere la umeri.<br>2. Împinge sus.<br>3. Revino lent."],
band:["Bandă elastică","3 serii × 15 repetări","Deschide pieptul.","1. Ține banda în față.<br>2. Trage brațele lateral.<br>3. Revino controlat."],
deadbug:["Dead Bug","3 serii × 10 / parte","Core blând.","1. Stai pe spate.<br>2. Întinde braț/picior opus.<br>3. Lombarul lipit de sol."],
birddog:["Bird Dog","3 serii × 10 / parte","Echilibru.","1. Stai în patru puncte.<br>2. Întinde braț și picior opus.<br>3. Revino lent."],
plank:["Plank","3 serii × 25-40 sec","Corp drept.","1. Coatele sub umeri.<br>2. Abdomen ușor încordat.<br>3. Respiră normal."],
side:["Plank lateral","3 serii × 20 sec / parte","Lateral trunchi.","1. Sprijin pe cot.<br>2. Ridică șoldul.<br>3. Corp drept."],
step:["Cardio ușor","4 minute","Fără impact mare.","1. Pași laterali.<br>2. Brațe naturale.<br>3. Ritm lejer."],
calf:["Ridicări pe vârfuri","3 serii × 18","Gambe.","1. Stai drept.<br>2. Urcă pe vârfuri.<br>3. Coboară lent."],
hinge:["Deadlift românesc ușor","3 serii × 12","Fesieri și posterior.","1. Genunchii ușor îndoiți.<br>2. Șoldul în spate.<br>3. Spatele drept."],
curl:["Biceps","2 serii × 12","Brațe.","1. Coatele lângă corp.<br>2. Ridică ganterele.<br>3. Coboară lent."],
triceps:["Triceps","2 serii × 12","Control.","1. Gantera sus.<br>2. Coboară în spatele capului.<br>3. Întinde sus."],
stretch:["Stretching","5 minute","Relaxare.","1. Mișcări lente.<br>2. Nu forța.<br>3. Respiră adânc."]
};
const weeks=[
[["squat","glute","lunge","calf","plank"],["row","press","band","birddog","deadbug"],["squat","row","glute","press","plank"],["step","deadbug","side","stretch"]],
[["glute","hinge","lunge","calf","plank"],["row","band","press","curl","deadbug"],["squat","glute","row","triceps","birddog"],["step","side","deadbug","stretch"]],
[["squat","hinge","glute","lunge","plank"],["row","press","band","curl","side"],["squat","row","press","glute","deadbug"],["step","birddog","plank","stretch"]],
[["glute","lunge","calf","hinge","side"],["row","band","press","triceps","deadbug"],["squat","glute","row","curl","plank"],["step","deadbug","birddog","stretch"]],
[["squat","glute","hinge","calf","plank"],["row","press","band","triceps","side"],["lunge","squat","row","glute","deadbug"],["step","plank","stretch"]],
[["band","row","press","curl","deadbug"],["glute","squat","lunge","calf","side"],["hinge","row","glute","press","plank"],["step","birddog","deadbug","stretch"]],
[["squat","lunge","hinge","glute","plank"],["row","press","band","curl","triceps"],["glute","squat","row","side","deadbug"],["step","plank","birddog","stretch"]],
[["glute","squat","calf","lunge","side"],["row","band","press","deadbug","birddog"],["hinge","glute","row","plank","stretch"],["step","deadbug","side","stretch"]]
];
function load(){try{let s=localStorage.getItem(STORE);if(s)state=JSON.parse(s)}catch(e){}if(!state.startDate)state.startDate=new Date().toISOString().slice(0,10);save();renderHome()}
function save(){localStorage.setItem(STORE,JSON.stringify(state))}function today(){return new Date().toISOString().slice(0,10)}
function wi(){let d=Math.floor((new Date(today())-new Date(state.startDate))/(86400000));return Math.floor(Math.max(0,d)/7)%8}
function di(){return state.total%4}
function badge(){let t=state.total;if(t>=100)return["👑","Regină","Ai terminat 100 antrenamente!"];if(t>=50)return["🥇","Aur","Mai ai "+(100-t)+" până la Regină."];if(t>=25)return["🥈","Argint","Mai ai "+(50-t)+" până la Aur."];if(t>=10)return["🥉","Bronz","Mai ai "+(25-t)+" până la Argint."];return["🌱","Start","Mai ai "+(10-t)+" până la Bronz."]}
function renderHome(){document.getElementById('weekPill').innerText='Săptămâna '+(wi()+1)+'/8';document.getElementById('totalPill').innerText=state.total+' antrenamente';let b=badge();document.getElementById('badgePill').innerText=b[1];document.getElementById('bigBadge').innerText=b[0];document.getElementById('badgeText').innerText=b[2];document.getElementById('bar').style.width=Math.min(100,state.total*10)+'%';cal()}
function cal(){let c=document.getElementById('calendar');c.innerHTML='';let n=new Date(),y=n.getFullYear(),m=n.getMonth(),first=new Date(y,m,1),last=new Date(y,m+1,0).getDate(),pad=(first.getDay()+6)%7;for(let i=0;i<pad;i++)c.innerHTML+='<div></div>';for(let d=1;d<=last;d++){let iso=new Date(y,m,d).toISOString().slice(0,10),cl='day';if(state.doneDates.includes(iso))cl+=' done';if(iso===today())cl+=' today';c.innerHTML+=`<div class="${cl}">${d}</div>`}}
function hide(){['home','plan','workout','finish'].forEach(id=>document.getElementById(id).classList.add('hidden'))}
function goHome(){hide();document.getElementById('home').classList.remove('hidden');renderHome()}
function showPlan(){hide();document.getElementById('plan').classList.remove('hidden');let w=wi();document.getElementById('planTitle').innerText='Săptămâna '+(w+1)+'/8';let h='';weeks[w].forEach((day,i)=>{h+=`<div class="exercise"><h3>Ziua ${i+1}</h3>${day.map(k=>'• '+ex[k][0]).join('<br>')}</div>`});document.getElementById('planBody').innerHTML=h}
function startToday(){let w=wi(),d=di();currentWorkout=weeks[w][d];currentIndex=0;currentLabel='Săptămâna '+(w+1)+' · Ziua '+(d+1);showEx()}
function showEx(){hide();document.getElementById('workout').classList.remove('hidden');let k=currentWorkout[currentIndex],e=ex[k];document.getElementById('workoutTitle').innerText=currentLabel+' · '+(currentIndex+1)+'/'+currentWorkout.length;document.getElementById('exName').innerText=e[0];document.getElementById('exDetails').innerText=e[1];document.getElementById('exTip').innerText=e[2];document.getElementById('exSteps').innerHTML=e[3];draw(k)}
function nextExercise(){currentIndex++;if(currentIndex>=currentWorkout.length){hide();document.getElementById('finish').classList.remove('hidden')}else showEx()}
function completeWorkout(){let t=today();if(!state.doneDates.includes(t)){state.doneDates.push(t);state.total++}save();goHome()}
function person(x,y){return `<circle cx="${x}" cy="${y}" r="13" fill="#ffb3cf"/><line x1="${x}" y1="${y+15}" x2="${x}" y2="${y+66}" stroke="#4a1830" stroke-width="8" stroke-linecap="round"/><line x1="${x}" y1="${y+34}" x2="${x-38}" y2="${y+58}" stroke="#ff5c93" stroke-width="7" stroke-linecap="round"/><line x1="${x}" y1="${y+34}" x2="${x+38}" y2="${y+58}" stroke="#ff5c93" stroke-width="7" stroke-linecap="round"/><line x1="${x}" y1="${y+66}" x2="${x-30}" y2="${y+125}" stroke="#4a1830" stroke-width="8" stroke-linecap="round"/><line x1="${x}" y1="${y+66}" x2="${x+30}" y2="${y+125}" stroke="#4a1830" stroke-width="8" stroke-linecap="round"/>`}
function draw(type){let s=document.getElementById('anim');if(type==='glute')s.innerHTML=`<style>@keyframes hip{0%,100%{transform:translateY(18px)}50%{transform:translateY(-10px)}}.hip{animation:hip 1.1s infinite}</style><line x1="70" y1="175" x2="300" y2="175" stroke="#ffd1e2" stroke-width="10"/><circle cx="120" cy="135" r="13" fill="#ffb3cf"/><line class="hip" x1="135" y1="145" x2="210" y2="155" stroke="#4a1830" stroke-width="9"/><line x1="210" y1="155" x2="265" y2="175" stroke="#4a1830" stroke-width="9"/><text x="190" y="230" text-anchor="middle" fill="#8b6475">Pod fesier</text>`;
else if(['deadbug','birddog','plank','side'].includes(type))s.innerHTML=`<style>@keyframes core{0%,100%{transform:translateX(-12px)}50%{transform:translateX(12px)}}.m{animation:core 1.2s infinite}</style><g class="m"><circle cx="95" cy="125" r="13" fill="#ffb3cf"/><line x1="110" y1="130" x2="220" y2="130" stroke="#4a1830" stroke-width="9"/><line x1="155" y1="130" x2="120" y2="175" stroke="#ff5c93" stroke-width="7"/><line x1="185" y1="130" x2="245" y2="95" stroke="#ff5c93" stroke-width="7"/></g><text x="190" y="230" text-anchor="middle" fill="#8b6475">Core controlat</text>`;
else if(['row','band','press','curl','triceps'].includes(type))s.innerHTML=`<style>@keyframes arms{0%,100%{transform:rotate(0)}50%{transform:rotate(-25deg)}}.arm{animation:arms 1s infinite;transform-origin:190px 95px}</style><g>${person(190,45)}<line class="arm" x1="190" y1="95" x2="250" y2="75" stroke="#ff5c93" stroke-width="8" stroke-linecap="round"/></g><text x="190" y="230" text-anchor="middle" fill="#8b6475">Brațe / spate</text>`;
else s.innerHTML=`<style>@keyframes move{0%,100%{transform:translateY(0)}50%{transform:translateY(28px)}}.m{animation:move 1.1s infinite}</style><g class="m">${person(190,45)}</g><text x="190" y="230" text-anchor="middle" fill="#8b6475">Mișcare controlată</text>`}
load()
</script></body></html>
